name: Docker CI/CD + Deploy VPS

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️ Checkout del repo
      - uses: actions/checkout@v4

      # 2️ Login a Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3️ Build y push de la imagen
      - name: Build and push Docker image
        id: docker_build
        run: |
          echo "Definiendo nombre y tag de la imagen"
          IMAGE_NAME=${{ secrets.DOCKER_USER }}/my-image-name
          IMAGE_TAG=${IMAGE_NAME}:$(git rev-parse --short HEAD)
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
      
          echo "Construyendo la imagen Docker"
          docker build . -t $IMAGE_TAG
      
          echo "Subiendo la imagen a Docker Hub"
          docker push $IMAGE_TAG

      # 4️ Deploy en VPS vía SSH
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            echo "Entrando a la carpeta del proyecto"
            cd /Ismael/

            echo "Deteniendo contenedor previo si existe"
            docker stop my-container || true
            docker rm my-container || true

            echo "Haciendo pull de la nueva imagen"
            docker pull ${{ env.IMAGE_TAG }}

            echo "Ejecutando nuevo contenedor"
            docker run -d -p ${{ secrets.APP_PORT }}:8080 \
              --name my-container \
              ${{ env.IMAGE_TAG }}

            echo "Creando configuración Nginx"
            sudo tee /etc/nginx/sites-available/docker-mvc <<EOF
            server {
                listen 80;
                server_name ${{ secrets.DOMAIN }};

                location / {
                    proxy_pass http://localhost:${{ secrets.APP_PORT }};
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade \$http_upgrade;
                    proxy_set_header Connection 'upgrade';
                    proxy_set_header Host \$host;
                    proxy_cache_bypass \$http_upgrade;
                }
            }
            EOF

            echo "Activando sitio en Nginx"
            sudo ln -sf /etc/nginx/sites-available/docker-mvc /etc/nginx/sites-enabled/

            echo "Verificando configuración de Nginx"
            sudo nginx -t

            echo "Reiniciando Nginx"
            sudo systemctl reload nginx

            echo "Certbot y configurando SSL"
            sudo certbot --nginx -d ${{ secrets.DOMAIN }}

            echo "Deploy completado"
